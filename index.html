<h2>Contact Form</h2>

<form id="myForm">
  <input type="text" name="name" placeholder="Full Name*" required />
  <input type="tel" name="mobile" placeholder="Phone Number*" required />

  <input type="text" name="source" placeholder="Source" />
  <input type="text" name="medium" placeholder="Medium" />
  <input type="text" name="term" placeholder="Term" />
  <input type="text" name="content" placeholder="Content" />
  <input type="text" name="campaign" placeholder="Campaign" />
  <input type="text" name="gclid" placeholder="gclid" />
  
  <input type="submit" value="Submit">
</form>

<div id="output"></div>

<script>
  const form = document.getElementById("myForm");
  const output = document.getElementById("output");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const data = new FormData(form);

    let result = "<h3>Submitted Data:</h3>";

    for (let [key, value] of data.entries()) {
      result += `<strong>${key}:</strong> ${value || "(empty)"}<br>`;
    }

    output.innerHTML = result;
  });
</script>

</body>
